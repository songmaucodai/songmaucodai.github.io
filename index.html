<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - Sống Màu Cỏ Dại</title>
    
    <link rel="stylesheet" href="https://dl.songmaucodai.com/global.css">
    
    <link rel="icon" href="https://songmaucodai.com/favicon.ico" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bgBase);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CHỮ CHUYỂN NHÀ THEO ĐÚNG MẪU BÁC GỬI */
        h1 {
            font-size: 3.0rem;
            margin: 0 0 40px 0;
            font-weight: 800;
            letter-spacing: -1.5px;
            
            background: linear-gradient(135deg, var(--textMain) 30%, var(--teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            animation: textPulse 4s ease-in-out infinite, fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* KHỐI TERMINAL "QUỐC DÂN" XỊN SÒ TRỞ LẠI */
        .terminal {
            background: var(--bgPanel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 20px 25px;
            width: 100%;
            max-width: 500px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #abb2bf;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: left;
            position: relative;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both 0.2s;
        }

        /* 3 Nút Mac Xanh Đỏ Vàng */
        .terminal::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5f56;
            box-shadow: 20px 0 0 #ffbd2e, 40px 0 0 #27c93f;
            margin-bottom: 25px;
        }

        .line-wrapper {
            margin-bottom: 6px;
        }

        /* Bảng màu cú pháp Code Editor */
        .prompt { color: #c678dd; margin-right: 10px; font-weight: bold; }
        .keyword { color: #c678dd; }
        .variable { color: #e5c07b; }
        .function { color: #61afef; }
        .string { color: #98c379; }
        .output { color: var(--teal); font-weight: bold; font-size: 1.05rem; }

        /* CSS cho nút quay về GitHub */
.back-to-github {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 40px;
    padding: 10px 18px;
    color: #8b949e; 
    text-decoration: none;
    font-family: inherit; 
    font-size: 14px;
    transition: all 0.2s ease;
    background-color: transparent;
    cursor: pointer;
}

.back-to-github:hover {
    color: #c9d1d9;
}

.back-to-github svg {
    transition: transform 0.2s ease;
}

.back-to-github:hover .icon-arrow {
    transform: translateX(-4px); 
}
        
        #cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #528bff;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        /* KEYFRAMES */
        @keyframes textPulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.85; filter: brightness(1.1); }
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0; } 
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; letter-spacing: -1px; margin-bottom: 30px; }
            .terminal { padding: 15px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <h1>Nhà Chính Thức</h1>
    
    <div class="terminal">
        <div id="typewriter"></div>
        <span id="cursor"></span>
    </div>

    <a href="https://github.com/songmaucodai" class="back-to-github">
        <svg class="icon-arrow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        
        <svg class="icon-github" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>

        <span>GitHub Profile</span>
    </a>

    <script>
        const b64 = "c29uZ21hdWNvZGFpLmNvbQ==";
        
        const lines = [
            { type: 'input', text: `const target = atob("${b64}");` },
            { type: 'input', text: 'console.log(target);' },
            { type: 'output', text: '> "songmaucodai.com"' }
        ];

        const typeWriterEl = document.getElementById('typewriter');
        let currentLine = 0;
        
        function syntaxHighlight(text) {
            return text
                .replace('const', '<span class="keyword">const</span>')
                .replace('target', '<span class="variable">target</span>')
                .replace('atob', '<span class="function">atob</span>')
                .replace('console', '<span class="function">console</span>')
                .replace('log', '<span class="function">log</span>')
                .replace(`"${b64}"`, `<span class="string">"${b64}"</span>`);
        }

        async function typeLine() {
            if (currentLine >= lines.length) return;
            
            const line = lines[currentLine];
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line-wrapper';
            
            if (line.type === 'output') {
                await new Promise(r => setTimeout(r, 600)); 
                lineDiv.innerHTML = `<span class="output">${line.text}</span>`;
                typeWriterEl.appendChild(lineDiv);
                currentLine++;
                typeLine();
                return;
            }

            lineDiv.innerHTML = '<span class="prompt">❯</span>';
            const textNode = document.createElement('span');
            lineDiv.appendChild(textNode);
            typeWriterEl.appendChild(lineDiv);
            
            let i = 0;
            const typeChar = () => {
                if (i < line.text.length) {
                    textNode.textContent += line.text.charAt(i);
                    i++;
                    setTimeout(typeChar, 20 + Math.random() * 40); 
                } else {
                    textNode.innerHTML = syntaxHighlight(line.text);
                    currentLine++;
                    setTimeout(typeLine, 400); 
                }
            };
            
            await new Promise(r => setTimeout(r, 300));
            typeChar();
        }

        setTimeout(typeLine, 800);
    </script>

</body>
</html>
